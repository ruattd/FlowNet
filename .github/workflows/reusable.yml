name: "Reusable Build"

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      config:
        required: false
        type: string
        default: "Debug"
      version:
        required: false
        type: string
        default: ""

jobs:
  build:
    name: "Build"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6.0.2

      - name: "Setup .NET"
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 10.0.x

      - name: "Build Package"
        run: |
          VERSION=${{ inputs.version }}
          VERSION=${VERSION#v}
          dotnet publish -c ${{ inputs.config }} ${VERSION:+-p:Version=$VERSION}

      - name: "Upload Artifact"
        uses: actions/upload-artifact@v7.0.0
        with:
          path: FlowNet/bin/${{ inputs.config }}/*.nupkg
          archive: false
